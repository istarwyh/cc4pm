<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <style>
    text { font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9333ea"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" fill="#111827" font-size="20" font-weight="600">cc4pm 产品主理人完整工作流</text>
  
  <!-- Stage 1: Ideation (CIS) -->
  <rect x="60" y="100" width="200" height="80" rx="8" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
  <text x="160" y="130" text-anchor="middle" fill="#111827" font-size="14" font-weight="600">💡 头脑风暴</text>
  <text x="160" y="150" text-anchor="middle" fill="#6b7280" font-size="12">CIS: 36种创意技巧</text>
  <text x="160" y="165" text-anchor="middle" fill="#6b7280" font-size="11">Carson Agent</text>
  
  <!-- Stage 2: Market Research -->
  <rect x="320" y="100" width="200" height="80" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="420" y="130" text-anchor="middle" fill="#111827" font-size="14" font-weight="600">📊 市场研究</text>
  <text x="420" y="150" text-anchor="middle" fill="#6b7280" font-size="12">领域分析 + 竞品</text>
  <text x="420" y="165" text-anchor="middle" fill="#6b7280" font-size="11">Mary Agent</text>
  
  <!-- Stage 3: PRD Creation -->
  <rect x="580" y="100" width="200" height="80" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="680" y="130" text-anchor="middle" fill="#111827" font-size="14" font-weight="600">📝 PRD 创建</text>
  <text x="680" y="150" text-anchor="middle" fill="#6b7280" font-size="12">需求文档 + 验证</text>
  <text x="680" y="165" text-anchor="middle" fill="#6b7280" font-size="11">John Agent</text>
  
  <!-- Stage 4: UX Design (WDS) -->
  <rect x="840" y="100" width="200" height="80" rx="8" fill="#fae8ff" stroke="#c084fc" stroke-width="2"/>
  <text x="940" y="130" text-anchor="middle" fill="#111827" font-size="14" font-weight="600">🎨 UX 设计</text>
  <text x="940" y="150" text-anchor="middle" fill="#6b7280" font-size="12">WDS: Trigger Map</text>
  <text x="940" y="165" text-anchor="middle" fill="#6b7280" font-size="11">Saga + Freya</text>
  
  <!-- Stage 5: Architecture Planning -->
  <rect x="320" y="280" width="200" height="80" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="420" y="310" text-anchor="middle" fill="#111827" font-size="14" font-weight="600">🏗️ 架构设计</text>
  <text x="420" y="330" text-anchor="middle" fill="#6b7280" font-size="12">/plan 模式</text>
  <text x="420" y="345" text-anchor="middle" fill="#6b7280" font-size="11">Planner Agent</text>
  
  <!-- Stage 6: TDD Development -->
  <rect x="580" y="280" width="200" height="80" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="680" y="310" text-anchor="middle" fill="#111827" font-size="14" font-weight="600">⚙️ TDD 开发</text>
  <text x="680" y="330" text-anchor="middle" fill="#6b7280" font-size="12">测试驱动开发</text>
  <text x="680" y="345" text-anchor="middle" fill="#6b7280" font-size="11">TDD Guide</text>
  
  <!-- Stage 7: Code Review -->
  <rect x="840" y="280" width="200" height="80" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="940" y="310" text-anchor="middle" fill="#111827" font-size="14" font-weight="600">🔍 代码审查</text>
  <text x="940" y="330" text-anchor="middle" fill="#6b7280" font-size="12">质量保障</text>
  <text x="940" y="345" text-anchor="middle" fill="#6b7280" font-size="11">Code Reviewer</text>
  
  <!-- Stage 8: E2E Testing -->
  <rect x="450" y="460" width="200" height="80" rx="8" fill="#ccfbf1" stroke="#14b8a6" stroke-width="2"/>
  <text x="550" y="490" text-anchor="middle" fill="#111827" font-size="14" font-weight="600">🧪 E2E 测试</text>
  <text x="550" y="510" text-anchor="middle" fill="#6b7280" font-size="12">端到端验证</text>
  <text x="550" y="525" text-anchor="middle" fill="#6b7280" font-size="11">E2E Runner</text>
  
  <!-- Stage 9: Deployment -->
  <rect x="710" y="460" width="200" height="80" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="810" y="490" text-anchor="middle" fill="#111827" font-size="14" font-weight="600">🚀 部署上线</text>
  <text x="810" y="510" text-anchor="middle" fill="#6b7280" font-size="12">CI/CD 自动化</text>
  <text x="810" y="525" text-anchor="middle" fill="#6b7280" font-size="11">Git + Hooks</text>
  
  <!-- Stage 10: Continuous Learning -->
  <rect x="450" y="620" width="460" height="80" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="680" y="650" text-anchor="middle" fill="#111827" font-size="14" font-weight="600">📚 持续学习与优化</text>
  <text x="680" y="670" text-anchor="middle" fill="#6b7280" font-size="12">/learn 提取模式 + 知识沉淀 (QMD)</text>
  <text x="680" y="685" text-anchor="middle" fill="#6b7280" font-size="11">Session Analysis + Memory System</text>
  
  <!-- Arrows: Stage 1 -> 2 -->
  <path d="M 260,140 L 320,140" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="275" y="128" width="30" height="16" fill="#ffffff" opacity="0.95"/>
  <text x="290" y="139" text-anchor="middle" fill="#6b7280" font-size="11">想法</text>
  
  <!-- Arrows: Stage 2 -> 3 -->
  <path d="M 520,140 L 580,140" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="535" y="128" width="30" height="16" fill="#ffffff" opacity="0.95"/>
  <text x="550" y="139" text-anchor="middle" fill="#6b7280" font-size="11">洞察</text>
  
  <!-- Arrows: Stage 3 -> 4 -->
  <path d="M 780,140 L 840,140" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>
  <rect x="795" y="128" width="30" height="16" fill="#ffffff" opacity="0.95"/>
  <text x="810" y="139" text-anchor="middle" fill="#6b7280" font-size="11">需求</text>
  
  <!-- Arrows: Stage 4 -> 5 (curved down) -->
  <path d="M 940,180 L 940,240 L 520,240 L 520,280" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <rect x="715" y="228" width="30" height="16" fill="#ffffff" opacity="0.95"/>
  <text x="730" y="239" text-anchor="middle" fill="#6b7280" font-size="11">设计</text>
  
  <!-- Arrows: Stage 5 -> 6 -->
  <path d="M 520,320 L 580,320" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <rect x="535" y="308" width="30" height="16" fill="#ffffff" opacity="0.95"/>
  <text x="550" y="319" text-anchor="middle" fill="#6b7280" font-size="11">计划</text>
  
  <!-- Arrows: Stage 6 -> 7 -->
  <path d="M 780,320 L 840,320" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <rect x="795" y="308" width="30" height="16" fill="#ffffff" opacity="0.95"/>
  <text x="810" y="319" text-anchor="middle" fill="#6b7280" font-size="11">代码</text>
  
  <!-- Arrows: Stage 7 -> 8 (curved down) -->
  <path d="M 940,360 L 940,420 L 550,420 L 550,460" stroke="#9333ea" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
  <rect x="730" y="408" width="30" height="16" fill="#ffffff" opacity="0.95"/>
  <text x="745" y="419" text-anchor="middle" fill="#6b7280" font-size="11">审查</text>
  
  <!-- Arrows: Stage 8 -> 9 -->
  <path d="M 650,500 L 710,500" stroke="#9333ea" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
  <rect x="665" y="488" width="30" height="16" fill="#ffffff" opacity="0.95"/>
  <text x="680" y="499" text-anchor="middle" fill="#6b7280" font-size="11">通过</text>
  
  <!-- Arrows: Stage 9 -> 10 -->
  <path d="M 810,540 L 810,580 L 680,580 L 680,620" stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#arrow-orange)"/>
  <rect x="730" y="568" width="30" height="16" fill="#ffffff" opacity="0.95"/>
  <text x="745" y="579" text-anchor="middle" fill="#6b7280" font-size="11">上线</text>
  
  <!-- Feedback loop: Stage 10 -> Stage 1 -->
  <path d="M 450,660 L 60,660 L 60,140" stroke="#ea580c" stroke-width="2" fill="none" marker-end="url(#arrow-orange)" stroke-dasharray="5,3"/>
  <rect x="240" y="648" width="50" height="16" fill="#ffffff" opacity="0.95"/>
  <text x="265" y="659" text-anchor="middle" fill="#6b7280" font-size="11">迭代优化</text>
  
  <!-- Legend -->
  <g transform="translate(40, 740)">
    <line x1="0" y1="8" x2="40" y2="8" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
    <text x="48" y="12" fill="#6b7280" font-size="12">产品定义流</text>
    
    <line x1="160" y1="8" x2="200" y2="8" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow-green)"/>
    <text x="208" y="12" fill="#6b7280" font-size="12">开发流</text>
    
    <line x1="280" y1="8" x2="320" y2="8" stroke="#9333ea" stroke-width="2" marker-end="url(#arrow-purple)"/>
    <text x="328" y="12" fill="#6b7280" font-size="12">测试部署流</text>
    
    <line x1="440" y1="8" x2="480" y2="8" stroke="#ea580c" stroke-width="2" marker-end="url(#arrow-orange)" stroke-dasharray="5,3"/>
    <text x="488" y="12" fill="#6b7280" font-size="12">反馈迭代</text>
  </g>
  
</svg>