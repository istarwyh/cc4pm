<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>cc4pm 全景：四大模块与产品思维 — Lesson 1 互动版</title>
<link rel="stylesheet" href="../assets/base.css">
<style>
  /* === Section 1: 代理循环动画 === */
  .loop-container {
    position: relative;
    width: 340px;
    height: 340px;
    margin: 1.5rem auto 2rem;
  }
  .loop-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-inverse);
    font-size: .75rem;
    font-weight: 700;
    text-align: center;
    line-height: 1.2;
    box-shadow: 0 0 24px var(--accent-glow);
    z-index: 2;
  }
  .loop-step {
    position: absolute;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: var(--bg-secondary);
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: .72rem;
    font-weight: 600;
    color: var(--text-secondary);
    transition: all .4s ease;
    cursor: default;
    line-height: 1.3;
    z-index: 2;
  }
  .loop-step.active {
    border-color: var(--accent);
    background: var(--accent-light);
    color: var(--accent-hover);
    box-shadow: 0 0 16px var(--accent-glow);
    transform: scale(1.12);
  }
  .loop-step.result-step.active {
    border-color: var(--green);
    background: var(--green-light);
    color: var(--green);
    box-shadow: 0 0 16px var(--green-glow);
  }

  /* SVG arrows */
  .loop-svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }
  .loop-svg .arrow-path {
    fill: none;
    stroke: var(--border);
    stroke-width: 2;
    marker-end: url(#arrowhead);
  }
  .loop-svg .arrow-path.active {
    stroke: var(--accent);
    stroke-width: 2.5;
  }
  .loop-svg .arrow-path.result-active {
    stroke: var(--green);
    stroke-width: 2.5;
  }

  .loop-controls {
    display: flex;
    justify-content: center;
    gap: .6rem;
    margin-bottom: 1.5rem;
  }
  .loop-controls button {
    padding: .45rem 1rem;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    background: var(--bg-secondary);
    color: var(--text-secondary);
    font-size: .82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition);
  }
  .loop-controls button:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: var(--shadow-sm);
  }
  .loop-controls button.active {
    background: var(--accent);
    color: var(--text-inverse);
    border-color: var(--accent);
  }

  .loop-status {
    text-align: center;
    font-size: .88rem;
    color: var(--text-secondary);
    margin-bottom: 1.5rem;
    min-height: 1.5rem;
  }
  .loop-status strong { color: var(--accent-hover); }

  /* Tools bar */
  .tools-bar {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: .6rem;
    margin-bottom: .5rem;
  }
  .tool-chip {
    position: relative;
    display: flex;
    align-items: center;
    gap: .4rem;
    padding: .5rem .9rem;
    border-radius: var(--radius-md);
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    font-size: .82rem;
    font-weight: 600;
    color: var(--text-primary);
    cursor: pointer;
    transition: all var(--transition);
  }
  .tool-chip:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }
  .tool-chip .tool-icon {
    font-size: 1.1rem;
  }
  .tool-tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--text-primary);
    color: var(--text-inverse);
    padding: .5rem .8rem;
    border-radius: var(--radius-sm);
    font-size: .75rem;
    font-weight: 400;
    white-space: nowrap;
    z-index: 10;
    box-shadow: var(--shadow-lg);
  }
  .tool-tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: var(--text-primary);
  }
  .tool-chip.show-tip .tool-tooltip {
    display: block;
  }

  /* === Section 2: 四大模块 === */
  .modules-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  .module-card {
    background: var(--bg-secondary);
    border: 2px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    cursor: pointer;
    transition: all .3s ease;
    text-align: center;
  }
  .module-card:hover {
    transform: translateY(-3px);
    box-shadow: var(--shadow-md);
  }
  .module-card.selected {
    box-shadow: var(--shadow-lg);
  }
  .module-card .mod-emoji { font-size: 2rem; margin-bottom: .5rem; }
  .module-card .mod-abbr {
    font-size: .7rem;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 99px;
    display: inline-block;
    margin-bottom: .4rem;
  }
  .module-card .mod-name { font-size: 1rem; font-weight: 700; margin-bottom: .25rem; }
  .module-card .mod-sub { font-size: .82rem; color: var(--text-muted); }

  /* Module color variants */
  .module-card[data-color="blue"] { border-color: var(--blue-light); }
  .module-card[data-color="blue"]:hover,
  .module-card[data-color="blue"].selected { border-color: var(--blue); box-shadow: 0 0 20px var(--blue-glow); }
  .module-card[data-color="blue"] .mod-abbr { background: var(--blue-light); color: var(--blue); }

  .module-card[data-color="purple"] { border-color: var(--purple-light); }
  .module-card[data-color="purple"]:hover,
  .module-card[data-color="purple"].selected { border-color: var(--purple); box-shadow: 0 0 20px var(--purple-glow); }
  .module-card[data-color="purple"] .mod-abbr { background: var(--purple-light); color: var(--purple); }

  .module-card[data-color="cyan"] { border-color: var(--cyan-light); }
  .module-card[data-color="cyan"]:hover,
  .module-card[data-color="cyan"].selected { border-color: var(--cyan); box-shadow: 0 0 20px var(--cyan-glow); }
  .module-card[data-color="cyan"] .mod-abbr { background: var(--cyan-light); color: var(--cyan); }

  .module-card[data-color="green"] { border-color: var(--green-light); }
  .module-card[data-color="green"]:hover,
  .module-card[data-color="green"].selected { border-color: var(--green); box-shadow: 0 0 20px var(--green-glow); }
  .module-card[data-color="green"] .mod-abbr { background: var(--green-light); color: var(--green); }

  .module-detail {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.8rem 2rem;
    margin-bottom: 1.5rem;
    box-shadow: var(--shadow-sm);
    display: none;
  }
  .module-detail.visible { display: block; animation: fadeSlideIn .3s ease; }
  .module-detail h3 { margin-bottom: .6rem; }
  .module-detail .agent-tags {
    display: flex;
    flex-wrap: wrap;
    gap: .4rem;
    margin-top: .6rem;
  }
  .module-detail .agent-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 99px;
    font-size: .75rem;
    font-weight: 600;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* === Section 3: 扩展体系 === */
  .ext-stack {
    display: flex;
    flex-direction: column;
    gap: .6rem;
    margin-bottom: 1rem;
  }
  .ext-layer {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.4rem;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    cursor: pointer;
    transition: all .3s ease;
  }
  .ext-layer:hover {
    border-color: var(--accent);
    box-shadow: var(--shadow-sm);
  }
  .ext-layer.expanded {
    border-color: var(--accent);
    box-shadow: var(--shadow-md);
  }
  .ext-layer .ext-icon { font-size: 1.4rem; flex-shrink: 0; }
  .ext-layer .ext-info { flex: 1; }
  .ext-layer .ext-name { font-weight: 700; font-size: .95rem; color: var(--text-primary); }
  .ext-layer .ext-desc { font-size: .8rem; color: var(--text-muted); }
  .ext-layer .ext-badge {
    font-size: .65rem;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 99px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .ext-badge.always   { background: var(--green-light); color: var(--green); }
  .ext-badge.on-demand { background: var(--accent-light); color: var(--accent); }
  .ext-badge.isolated  { background: var(--cyan-light); color: var(--cyan); }
  .ext-badge.one-click { background: var(--blue-light); color: var(--blue); }
  .ext-badge.event     { background: var(--purple-light); color: var(--purple); }

  .ext-expand {
    display: none;
    padding: .8rem 1.4rem;
    margin-top: -.2rem;
    margin-bottom: .2rem;
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 var(--radius-md) var(--radius-md);
    font-size: .82rem;
    color: var(--text-secondary);
    animation: fadeSlideIn .25s ease;
  }
  .ext-expand.visible { display: block; }
  .ext-expand code { font-size: .78rem; }

  /* === Section 4: 数字一览 === */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: .8rem;
    margin-bottom: 1.5rem;
  }
  .stat-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.2rem .8rem;
    text-align: center;
    transition: all .3s ease;
  }
  .stat-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
    border-color: var(--accent);
  }
  .stat-number {
    font-size: 2rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent-hover));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.2;
  }
  .stat-unit {
    font-size: .7rem;
    font-weight: 600;
    color: var(--text-muted);
    margin-top: .2rem;
  }
  .stat-label {
    font-size: .78rem;
    color: var(--text-secondary);
    font-weight: 600;
    margin-top: .3rem;
  }

  /* section spacing */
  .section { margin-bottom: 2.5rem; }
  .section > h2 {
    text-align: center;
    margin-bottom: 1.2rem;
    font-size: 1.2rem;
  }

  /* === Responsive === */
  @media (max-width: 600px) {
    .modules-grid { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: repeat(3, 1fr); }
    .loop-container { width: 280px; height: 280px; }
    .loop-step { width: 72px; height: 72px; font-size: .62rem; }
    .loop-center { width: 64px; height: 64px; font-size: .65rem; }
    .tools-bar { gap: .4rem; }
    .tool-chip { padding: .4rem .6rem; font-size: .75rem; }
  }
</style>
</head>
<body>

<h1><span class="gradient">cc4pm 全景</span></h1>
<p class="subtitle">四大模块与产品思维 · Lesson 1 互动版</p>

<!-- ============================================ -->
<!-- Section 1: 代理循环动画 -->
<!-- ============================================ -->
<div class="section">
  <h2>代理循环 Agentic Loop</h2>

  <div class="card">
    <div class="loop-container" id="loopContainer">
      <svg class="loop-svg" viewBox="0 0 340 340">
        <defs>
          <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="var(--border)" />
          </marker>
          <marker id="arrowhead-active" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="var(--accent)" />
          </marker>
          <marker id="arrowhead-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="var(--green)" />
          </marker>
        </defs>
        <!-- arrows rendered by JS -->
      </svg>
      <div class="loop-center">Agentic<br>Loop</div>
      <!-- steps positioned by JS -->
    </div>

    <div class="loop-status" id="loopStatus">点击 "播放" 观看代理循环动画</div>

    <div class="loop-controls">
      <button id="btnPlay" onclick="toggleLoop()">播放</button>
      <button onclick="resetLoop()">重置</button>
    </div>

    <p style="text-align:center; margin-bottom:.8rem; font-size:.88rem; color:var(--text-secondary);">
      <strong style="color:var(--text-primary);">7 个内置工具</strong> — 点击查看说明
    </p>
    <div class="tools-bar" id="toolsBar"></div>
  </div>
</div>

<!-- ============================================ -->
<!-- Section 2: 四大模块互动图 -->
<!-- ============================================ -->
<div class="section">
  <h2>四大模块 Four Modules</h2>

  <div class="modules-grid" id="modulesGrid"></div>
  <div class="module-detail" id="moduleDetail"></div>
</div>

<!-- ============================================ -->
<!-- Section 3: 扩展体系概览 -->
<!-- ============================================ -->
<div class="section">
  <h2>扩展体系 Extension Layers</h2>

  <div class="card" style="padding:1.5rem;">
    <div class="ext-stack" id="extStack"></div>
  </div>
</div>

<!-- ============================================ -->
<!-- Section 4: 数字一览 -->
<!-- ============================================ -->
<div class="section">
  <h2>数字一览 Stats at a Glance</h2>

  <div class="stats-row" id="statsRow"></div>

  <div class="callout" style="text-align:center; font-size:.95rem;">
    <strong>cc4pm</strong> 是一个完整的 Claude Code 工具箱 —
    从需求分析到代码交付，覆盖产品经理与工程师的全流程协作。
  </div>
</div>

<footer>cc4pm 交互式教学 · Lesson 1 互动版</footer>

<script>
/* ============================================================
   Section 1: Agentic Loop
   ============================================================ */
const loopSteps = [
  { label: '用户输入',   desc: '用户提出需求或问题' },
  { label: '模型分析',   desc: 'Claude 理解意图，规划下一步' },
  { label: '选择工具',   desc: '从 7 个工具中选择最合适的' },
  { label: '执行工具',   desc: '调用工具并获得结果' },
  { label: '检查结果',   desc: '分析工具返回的数据' },
  { label: '汇报结果',   desc: '向用户展示最终成果', isResult: true },
];

const tools = [
  { name: 'Read',  icon: '📖', tip: '读取文件内容（翻开一份文档）' },
  { name: 'Glob',  icon: '🔍', tip: '按模式搜索文件名（在文件柜里找文件）' },
  { name: 'Grep',  icon: '🔎', tip: '在文件内容中搜索文本（全文检索）' },
  { name: 'Edit',  icon: '✏️', tip: '精确修改文件中的某段文本（改一段文字）' },
  { name: 'Write', icon: '📝', tip: '创建或完整重写文件（写一份新文档）' },
  { name: 'Bash',  icon: '💻', tip: '运行终端命令（打开命令行执行操作）' },
  { name: 'Agent', icon: '🤖', tip: '启动子代理，在独立上下文中工作（派一个助手去做调研）' },
];

// Position steps in a circle
const container = document.getElementById('loopContainer');
const cx = 170, cy = 170, r = 130;
const stepEls = [];
const N = loopSteps.length;

loopSteps.forEach((step, i) => {
  const angle = (i / N) * 2 * Math.PI - Math.PI / 2;
  const x = cx + r * Math.cos(angle);
  const y = cy + r * Math.sin(angle);

  const el = document.createElement('div');
  el.className = 'loop-step' + (step.isResult ? ' result-step' : '');
  el.style.left = (x - 45) + 'px';
  el.style.top = (y - 45) + 'px';
  el.textContent = step.label;
  container.appendChild(el);
  stepEls.push(el);
});

// Draw arrows between steps
const svg = container.querySelector('.loop-svg');
const arrowEls = [];

for (let i = 0; i < N; i++) {
  const next = (i + 1) % N;
  const a1 = (i / N) * 2 * Math.PI - Math.PI / 2;
  const a2 = (next / N) * 2 * Math.PI - Math.PI / 2;

  const stepR = 48;
  const x1 = cx + (r - 2) * Math.cos(a1) + stepR * Math.cos(a2 > a1 ? a1 + 0.35 : a1 - 0.35);
  const y1 = cy + (r - 2) * Math.sin(a1) + stepR * Math.sin(a2 > a1 ? a1 + 0.35 : a1 - 0.35);

  // Simpler: use midpoints on the circle edge
  const gap = 0.12;
  const fromAngle = (i / N) * 2 * Math.PI - Math.PI / 2;
  const toAngle = (next / N) * 2 * Math.PI - Math.PI / 2;

  const sr = 48; // step radius
  const sx = cx + r * Math.cos(fromAngle) + sr * Math.cos(fromAngle + Math.PI / 2 * 0.6);
  const sy = cy + r * Math.sin(fromAngle) + sr * Math.sin(fromAngle + Math.PI / 2 * 0.6);
  const ex = cx + r * Math.cos(toAngle) - sr * Math.cos(toAngle + Math.PI / 2 * 0.6);
  const ey = cy + r * Math.sin(toAngle) - sr * Math.sin(toAngle + Math.PI / 2 * 0.6);

  // Compute start/end on circle edges of each step node
  const midAngle = (fromAngle + toAngle) / 2 + (next === 0 ? Math.PI : 0);
  const startX = cx + r * Math.cos(fromAngle) + (sr + 2) * Math.cos(midAngle > fromAngle ? (fromAngle + toAngle) / 2 : midAngle);
  const startY = cy + r * Math.sin(fromAngle) + (sr + 2) * Math.sin(midAngle > fromAngle ? (fromAngle + toAngle) / 2 : midAngle);

  // Simplified approach: draw arcs along the main circle
  const startA = fromAngle + gap;
  const endA = next === 0 ? (toAngle + 2 * Math.PI - gap) : (toAngle - gap);
  const arcStartX = cx + r * Math.cos(startA);
  const arcStartY = cy + r * Math.sin(startA);
  const arcEndX = cx + r * Math.cos(endA);
  const arcEndY = cy + r * Math.sin(endA);

  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  const largeArc = (next === 0 && i === N - 1) ? 1 : 0;
  path.setAttribute('d', `M ${arcStartX} ${arcStartY} A ${r} ${r} 0 ${largeArc} 1 ${arcEndX} ${arcEndY}`);
  path.setAttribute('class', 'arrow-path');
  path.setAttribute('marker-end', 'url(#arrowhead)');
  path.dataset.index = i;
  svg.appendChild(path);
  arrowEls.push(path);
}

// Animation state
let loopInterval = null;
let loopStep = -1;
let loopPlaying = false;

const statusEl = document.getElementById('loopStatus');
const btnPlay = document.getElementById('btnPlay');

const stepDescriptions = [
  '用户输入需求或提问',
  'Claude 分析意图，决定需要做什么',
  '从 Read / Glob / Grep / Edit / Write / Bash / Agent 中选择工具',
  '调用选中的工具，执行操作',
  '分析工具返回的结果 — 如果还没完成，回到"选择工具"继续循环',
  '任务完成！向用户汇报最终成果',
];

function highlightStep(idx) {
  stepEls.forEach((el, i) => el.classList.toggle('active', i === idx));
  arrowEls.forEach((path, i) => {
    const isActive = i === idx - 1 || (idx === 0 && i === N - 1);
    const isResult = idx === N - 1 && i === idx - 1;
    path.classList.toggle('active', isActive && !isResult);
    path.classList.toggle('result-active', isResult);
    if (isActive && isResult) {
      path.setAttribute('marker-end', 'url(#arrowhead-green)');
    } else if (isActive) {
      path.setAttribute('marker-end', 'url(#arrowhead-active)');
    } else {
      path.setAttribute('marker-end', 'url(#arrowhead)');
    }
  });
  statusEl.innerHTML = `<strong>${loopSteps[idx].label}</strong> — ${stepDescriptions[idx]}`;
}

function advanceLoop() {
  loopStep = (loopStep + 1) % N;
  highlightStep(loopStep);
}

function toggleLoop() {
  if (loopPlaying) {
    clearInterval(loopInterval);
    loopPlaying = false;
    btnPlay.textContent = '播放';
    btnPlay.classList.remove('active');
  } else {
    loopPlaying = true;
    btnPlay.textContent = '暂停';
    btnPlay.classList.add('active');
    advanceLoop();
    loopInterval = setInterval(advanceLoop, 1500);
  }
}

function resetLoop() {
  clearInterval(loopInterval);
  loopPlaying = false;
  loopStep = -1;
  btnPlay.textContent = '播放';
  btnPlay.classList.remove('active');
  stepEls.forEach(el => el.classList.remove('active'));
  arrowEls.forEach(path => {
    path.classList.remove('active', 'result-active');
    path.setAttribute('marker-end', 'url(#arrowhead)');
  });
  statusEl.innerHTML = '点击 "播放" 观看代理循环动画';
}

// Tools bar
const toolsBar = document.getElementById('toolsBar');
tools.forEach(tool => {
  const chip = document.createElement('div');
  chip.className = 'tool-chip';
  chip.innerHTML = `
    <span class="tool-icon">${tool.icon}</span>
    <span>${tool.name}</span>
    <div class="tool-tooltip">${tool.tip}</div>
  `;
  chip.addEventListener('click', (e) => {

const stats = [
  { value: 33, unit: '个', label: '代理 Agents' },
  { value: 96, unit: '个', label: '技能 Skills' },
  { value: 48, unit: '个', label: '命令 Commands' },

  { value: 44, unit: '个', label: 'Rules' },
];

const statsRow = document.getElementById('statsRow');
const numberEls = [];

stats.forEach(stat => {
  const card = document.createElement('div');
  card.className = 'stat-card';
  const numId = 'stat-' + stat.label.replace(/\s/g, '-');
  card.innerHTML = `
    <div class="stat-number" id="${numId}">0</div>
    <div class="stat-unit">${stat.unit}</div>
    <div class="stat-label">${stat.label}</div>
  `;
  statsRow.appendChild(card);
  numberEls.push({ el: document.getElementById(numId) || card.querySelector('.stat-number'), target: stat.value, counted: false });
});

// Wait for DOM to settle, then set up IDs properly
requestAnimationFrame(() => {
  stats.forEach((stat, i) => {
    const el = statsRow.children[i].querySelector('.stat-number');
    numberEls[i].el = el;
  });
});

function animateCount(el, target, duration) {
  const start = performance.now();
  function update(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic
    el.textContent = Math.round(eased * target);
    if (progress < 1) requestAnimationFrame(update);
  }
  requestAnimationFrame(update);
}

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      numberEls.forEach(item => {
        if (!item.counted) {
          item.counted = true;
          animateCount(item.el, item.target, 1200);
        }
      });
      observer.unobserve(entry.target);
    }
  });
}, { threshold: 0.3 });

observer.observe(statsRow);
