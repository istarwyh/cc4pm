.tabs{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem}
.tab-btn{padding:.5rem 1.2rem;border:1px solid var(--border);border-radius:99px;background:var(--bg-secondary);color:var(--text-secondary);cursor:pointer;font-size:.85rem;font-weight:600;transition:all var(--transition)}

.mcp-cat-btn{padding:.4rem 1rem;border:1px solid var(--border);border-radius:99px;background:var(--bg-secondary);font-size:.8rem;cursor:pointer;transition:all var(--transition)}
.mcp-cat-btn:hover{border-color:var(--accent)}

.mcp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:.8rem;margin:1rem 0}
.mcp-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-md);padding:1rem;transition:all var(--transition)}
.mcp-card:hover{border-color:var(--accent);box-shadow:var(--shadow-md)}
.mcp-card .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.3rem}
.mcp-card .name{font-family:var(--font-mono);font-weight:700;font-size:.9rem}
.mcp-card .type-badge{font-size:.65rem;padding:1px 6px;border-radius:99px;font-weight:600}
.type-cmd{background:var(--blue-light);color:var(--blue)}
.type-http{background:var(--green-light);color:var(--green)}
.type-py{background:var(--purple-light);color:var(--purple)}

.mcp-card .usage{font-size:.78rem;color:var(--accent);margin-top:.3rem;font-style:italic}
.tier-section{margin-bottom:1.5rem}
.tier-header{display:flex;align-items:center;gap:.8rem;padding:.8rem 1.2rem;border-radius:var(--radius-md);margin-bottom:.8rem;flex-wrap:wrap}

.tier-header .tier-info{flex:1;min-width:200px}
.tier-header .tier-name{font-weight:700;font-size:.95rem}
.tier-header .tier-desc{font-size:.8rem;opacity:.8}
.tier-header .tier-count{font-size:.7rem;padding:2px 8px;border-radius:99px;background:rgba(255,255,255,.4);font-weight:600}
.subcat-title{font-weight:600;font-size:.85rem;color:var(--text-secondary);margin:1rem 0 .5rem;padding-left:.5rem;border-left:3px solid var(--border)}

/* Timeline */
.timeline{position:relative;margin:1.5rem 0;padding-left:2rem}
.timeline::before{content:'';position:absolute;left:.8rem;top:0;bottom:0;width:2px;background:var(--border)}
.tl-group{margin-bottom:1.5rem;position:relative}
.tl-group::before{content:'';position:absolute;left:-1.2rem;top:.3rem;width:12px;height:12px;border-radius:50%;border:2px solid var(--accent);background:var(--bg-secondary)}
.tl-group.done::before{background:var(--accent)}
.tl-group .day{font-weight:700;font-size:.9rem;color:var(--accent);margin-bottom:.3rem}
.tl-step{display:flex;gap:.8rem;padding:.3rem 0;font-size:.85rem;align-items:flex-start}
.tl-step .cmd{font-family:var(--font-mono);font-weight:600;color:var(--accent-hover);min-width:190px}
.tl-step .what{color:var(--text-secondary)}

/* Agent panorama */
.team-section{margin-bottom:1.5rem}
.team-title{font-weight:700;font-size:.95rem;padding:.5rem .8rem;border-radius:var(--radius-sm);margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
.team-agents{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.5rem}
.team-agent{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.6rem .8rem;font-size:.85rem;display:flex;justify-content:space-between;align-items:center}
.team-agent .agent-name{font-weight:600}
.team-agent .agent-role{font-size:.78rem;color:var(--text-muted)}

/* Learning pipeline */
.pipe{display:flex;flex-direction:column;gap:.3rem;margin:1rem 0}
.pipe-step{display:flex;align-items:center;gap:1rem;padding:.8rem 1.2rem;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-md)}
.pipe-step .icon{font-size:1.5rem;min-width:40px;text-align:center}
.pipe-step .cmd{font-family:var(--font-mono);font-weight:700;font-size:.85rem;color:var(--accent)}
.pipe-step .level{font-size:.7rem;padding:1px 6px;border-radius:99px;font-weight:600}
.pipe-arrow{text-align:center;color:var(--text-muted);font-size:1.2rem}

/* Graduation */
.grad-box{background:linear-gradient(135deg,var(--accent-light),#fef9ee);border:2px solid var(--accent);border-radius:var(--radius-xl);padding:2.5rem;text-align:center;margin:2rem 0}
.grad-box h2{font-size:1.5rem;margin-bottom:1rem}
.grad-stats{display:flex;justify-content:center;gap:2rem;flex-wrap:wrap;margin:1.5rem 0}
.grad-stat{text-align:center}
.grad-stat .num{font-size:2rem;font-weight:700;color:var(--accent)}
.grad-stat .label{font-size:.8rem;color:var(--text-secondary)}

/* Abbr */
.abbr-group{margin-bottom:1.5rem}
.abbr-group h3{margin-bottom:.5rem}
.abbr-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.3rem}
.abbr-item{display:flex;gap:.5rem;padding:.3rem .6rem;font-size:.85rem;border-bottom:1px solid var(--border)}
.abbr-item:hover{background:var(--accent-glow)}
.abbr-item .short{font-family:var(--font-mono);font-weight:700;color:var(--accent-hover);min-width:60px}

/* Config example */
.config-box{background:var(--bg-code);border:1px solid var(--border);border-radius:var(--radius-md);padding:1.2rem;font-family:var(--font-mono);font-size:.82rem;line-height:1.6;overflow-x:auto;margin:1rem 0}
.config-box .key{color:var(--blue)}

@media(max-width:700px){

const tabsEl = document.getElementById('mainTabs');

tabs.forEach((t,i)=>{
  const btn = document.createElement('button');
  btn.className = 'tab-btn'+(i===0?' active':'');
  btn.textContent = t.label;
  btn.onclick = ()=>switchTab(t.id);
  btn.dataset.id = t.id;
  tabsEl.appendChild(btn);

  panel.className = 'tab-panel'+(i===0?' active':'');

function switchTab(id){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.id===id));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+id));
}

<div class="header"><span class="name">${m.name}</span><span class="type-badge ${typeClass}">${typeLabel}</span></div>

      const grid = document.createElement('div');
      grid.className = 'mcp-grid';
      grid.innerHTML = t.servers.map(renderCard).join('');
      sec.appendChild(grid);

      t.subcats.forEach(sc=>{

  <span class="key">"command"</span>: <span class="str">"npx"</span>,
  <span class="key">"args"</span>: [<span class="str">"-y"</span>, <span class="str">"@modelcontextprotocol/server-memory"</span>]
}

<span class="cmt">// 第二层：command 类型，需要 API Key</span>
<span class="key">"github"</span>: {
  <span class="key">"command"</span>: <span class="str">"npx"</span>,
  <span class="key">"args"</span>: [<span class="str">"-y"</span>, <span class="str">"@modelcontextprotocol/server-github"</span>],
  <span class="key">"env"</span>: { <span class="key">"GITHUB_PERSONAL_ACCESS_TOKEN"</span>: <span class="str">"ghp_xxxxxxxxxxxx"</span> }
}

<span class="cmt">// 第三层：http 类型，连接远程服务</span>
<span class="key">"vercel"</span>: {
  <span class="key">"type"</span>: <span class="str">"http"</span>,
  <span class="key">"url"</span>: <span class="str">"https://mcp.vercel.com"</span>
}

<span class="cmt">// 第三层：python 类型，本地 Python 进程</span>
<span class="key">"insaits"</span>: {
  <span class="key">"command"</span>: <span class="str">"python3"</span>,
  <span class="key">"args"</span>: [<span class="str">"-m"</span>, <span class="str">"insa_its.mcp_server"</span>]

})();
