<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
    <linearGradient id="curveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b05050;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#b05050;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0052ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="960" height="600" fill="#ffffff" />
  <text x="480" y="50" text-anchor="middle" font-size="24" font-weight="800" fill="#111">AI 生产力演进的“J 曲线”</text>
  <text x="480" y="80" text-anchor="middle" font-size="14" fill="#888">为什么效率爆发需要时间？</text>
  <line x1="100" y1="500" x2="860" y2="500" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="100" y1="500" x2="100" y2="120" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="860" y="530" text-anchor="end" font-size="14" fill="#666">时间 (Time)</text>
  <text x="80" y="110" text-anchor="start" font-size="14" fill="#666">生产力 (Productivity)</text>
  <line x1="100" y1="350" x2="860" y2="350" stroke="#eee" stroke-width="1" stroke-dasharray="5,5" />
  <text x="110" y="340" font-size="12" fill="#aaa">旧技术生产力基准线</text>
  <path d="M 100,350 C 250,350 350,550 500,450 S 700,50 850,80" fill="none" stroke="url(#curveGradient)" stroke-width="6" stroke-linecap="round" />
  <circle cx="200" cy="350" r="6" fill="#b05050" />
  <text x="200" y="330" text-anchor="middle" font-size="13" font-weight="bold" fill="#b05050">1. 初始投入期</text>
  <text x="200" y="380" text-anchor="middle" font-size="11" fill="#888">高预期 / 硬件采购</text>
  <circle cx="400" cy="485" r="8" fill="#b05050" />
  <text x="400" y="515" text-anchor="middle" font-size="14" font-weight="bold" fill="#b05050">2. 阵痛期 (索洛悖论)</text>
  <text x="400" y="535" text-anchor="middle" font-size="11" fill="#888">学习成本 / 组织重构 / 效率不稳</text>
  <circle cx="780" cy="115" r="6" fill="#0052ff" />
  <text x="780" y="95" text-anchor="middle" font-size="13" font-weight="bold" fill="#0052ff">3. 爆发增长期</text>
  <text x="780" y="145" text-anchor="middle" font-size="11" fill="#888">流程融合 / 规模效应</text>
  <rect x="550" y="250" width="220" height="60" rx="8" fill="#f0f7ff" stroke="#0052ff" stroke-width="1" />
  <text x="660" y="275" text-anchor="middle" font-size="12" font-weight="bold" fill="#0052ff">“J 曲线”拐点</text>
  <text x="660" y="295" text-anchor="middle" font-size="11" fill="#555">价值从“工具”转变为“能力”</text>
</svg>